<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./main.css" />
    <script src="webxdc.js"></script>
    <title>Quick Lock</title>
  </head>
  <body>
    <h1 id="doorName">Door</h1>

    <button id="slider" class="slider open" aria-label="tap to retry locking">
      <img id="sliderImg" src="./open.png" alt="" />
    </button>

    <p id="status" class="status">
      <span id="statusText">…</span>
    </p>
    <p class="lastUpdate"><small id="lastUpdate"></small></p>
    <p><em><small id="deviceName"></small></em></p>

    <script src="./main.js" type="module"></script>
  </body>
</html>
